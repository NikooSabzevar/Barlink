version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: barlink_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: barlink
      POSTGRES_PASSWORD: barlink_secret
      POSTGRES_DB: barlink_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U barlink -d barlink_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: barlink_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass barlink_redis_secret
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', 'barlink_redis_secret', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: barlink_redis_ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0:barlink_redis_secret
    ports:
      - '8081:8081'
    depends_on:
      - redis

volumes:
  postgres_data:
  redis_data:
